name: Test and deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency: {group: production, cancel-in-progress: false}
jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vmray_test
          POSTGRES_USER: vmray_test
          POSTGRES_PASSWORD: vmray_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vmray_test -d vmray_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql://vmray_test:vmray_test@localhost:5432/vmray_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install '.[test]' && pytest -q
      - run: docker build -t vmray-analytics:${{ github.sha }} .
      - name: Configure SSH
        env:
          KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s' "$KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' '77.42.72.36 ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHqwEp5zxtWtQAodDEdNPjycCIiPa7mePKHVP2w+Cb4Q' > ~/.ssh/known_hosts
      - name: Transfer release
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$USER@$HOST" 'mkdir -p /home/deploy/vmray-analytics'
          tar --exclude=.git --exclude=.env --exclude=private_docs --exclude=runtime --exclude=backups -czf - . | ssh -i ~/.ssh/deploy_key -p "$PORT" "$USER@$HOST" 'cd /home/deploy/vmray-analytics && tar -xzf -'
      - name: Deploy and verify
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}
          USER: ${{ secrets.DEPLOY_USER }}
          PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$PORT" "$USER@$HOST" 'cd /home/deploy/vmray-analytics && chmod +x ops/*.sh && ./ops/provision-env.sh && docker compose build && docker compose run --rm migrate && docker compose run --rm collector python -m app.recompute && docker compose up -d --build --remove-orphans && for i in $(seq 1 30); do curl -fsS http://localhost/ready && break; sleep 5; done && curl -fsS http://localhost/ready && docker compose ps'
