<div class="table-wrap"><table><thead><tr><th>Category</th><th>Operation</th><th>Severity</th><th>Gained</th><th>Lost</th><th>Net</th></tr></thead><tbody>{% for row in rows %}<tr class="{{ 'regression-row' if row.net < 0 else '' }}"><td>{{ row.category or 'Uncategorized' }}</td><td>{{ row.operation or '—' }}</td><td>{{ row.severity }}</td><td>{{ row.samples_gained }}</td><td>{{ row.samples_lost }}</td><td>{{ row.net }}</td></tr>{% else %}<tr><td colspan="6">No VTI changes.</td></tr>{% endfor %}</tbody></table></div>
