services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vmray}
      POSTGRES_USER: ${POSTGRES_USER:-vmray}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck: {test: [CMD-SHELL, "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"], interval: 5s, timeout: 5s, retries: 20}
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
  migrate:
    build: .
    command: [python, -m, app.migrate]
    environment: &app-env
      DATABASE_URL: postgresql://${POSTGRES_USER:-vmray}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-vmray}
      APP_ENV: production
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      VMRAY_BASE_URL: ${VMRAY_BASE_URL}
      VMRAY_API_KEY: ${VMRAY_API_KEY}
      VMRAY_VERIFY_TLS: ${VMRAY_VERIFY_TLS:-true}
      VMRAY_POLL_INTERVAL_SECONDS: ${VMRAY_POLL_INTERVAL_SECONDS:-300}
      VMRAY_FETCH_ANALYSIS_ARCHIVES: ${VMRAY_FETCH_ANALYSIS_ARCHIVES:-false}
    depends_on: {db: {condition: service_healthy}}
    restart: "no"
  web:
    build: .
    environment: *app-env
    depends_on: {migrate: {condition: service_completed_successfully}}
    healthcheck: {test: [CMD, python, -c, "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"], interval: 10s, timeout: 3s, retries: 10}
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
  collector:
    build: .
    command: [python, -m, app.collector, run]
    environment: *app-env
    depends_on:
      migrate: {condition: service_completed_successfully}
      web: {condition: service_healthy}
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
  proxy:
    image: caddy:2.10-alpine
    ports: ["80:8080"]
    volumes: [./ops/Caddyfile:/etc/caddy/Caddyfile:ro]
    depends_on: {web: {condition: service_healthy}}
    restart: unless-stopped
    security_opt: [no-new-privileges:true]
volumes:
  postgres_data:
